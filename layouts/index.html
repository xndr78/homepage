{{ define "main" }}
<div class="p-4 mb-4 text-white rounded bg-dark bg-hehe">
    <div class="col-md-6 px-0 block-intro">
        {{ .Content }}
    </div>
</div>

{{ range (where .Site.Pages "Type" "blog").ByPublishDate.Reverse }}
<div>
    <h4><a class="title" href="{{ .RelPermalink }}">{{ .Title }}</a></h4>
    <p>{{ .Summary }}</p>
</div>
{{ end }}
{{ end }}
